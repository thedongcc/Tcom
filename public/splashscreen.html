<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: transparent;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    -webkit-app-region: drag; user-select: none; -webkit-user-select: none;
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
}

.splash-card {
    width: 550px; height: 330px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    background-color: #0d0d12;
    box-shadow: none;
    opacity: 0;
    transform: scale(0.96);
    transition: opacity 0.35s ease-out, transform 0.35s ease-out;
    /* 卡片本身作为 flex 容器，内容自然撑满 */
    display: flex; flex-direction: column;
}
.splash-card.ready {
    opacity: 1;
    transform: scale(1);
}

/* 艺术画背景层 — absolute 不参与布局流 */
.artwork-bg {
    position: absolute; top: -3%; left: -3%; width: 106%; height: 106%;
    background-size: cover; background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
}

/* 底部深色渐变遮罩 */
.overlay {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 80%;
    background: linear-gradient(to top, rgba(13,13,18,0.85) 0%, rgba(13,13,18,0.7) 30%, rgba(13,13,18,0.35) 60%, transparent 100%);
    z-index: 2;
}

/* UI 内容层 — flex 流式布局，不用 absolute，永远不溢出 */
.ui-content {
    position: relative; z-index: 3;
    display: flex; flex-direction: column;
    flex: 1; /* 填满卡片 */
    justify-content: space-between;
    padding: 36px 40px 24px;
}

.brand { display: flex; flex-direction: column; }

.logo-text {
    font-size: 52px; font-weight: 800; letter-spacing: -2px;
    color: #f0e6ff;
    text-shadow: 0 0 30px rgba(223, 155, 255, 0.5);
    line-height: 1; display: flex; align-items: baseline; gap: 2px;
}
.logo-t { color: #df9bff; font-size: 62px; }



/* 中间弹性留白 */
.spacer { flex: 1; }

.footer { display: flex; flex-direction: column; gap: 8px; }

.status-row { display: flex; justify-content: space-between; align-items: flex-end; }
.status-text {
    font-size: 11px; font-weight: 300;
    color: rgba(255,255,255,0.8);
    font-family: 'Cascadia Code', 'Menlo', 'Consolas', monospace;
}
.version { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 600; }

.progress-track {
    width: 100%; height: 2px; background: rgba(255,255,255,0.1);
    border-radius: 1px; overflow: hidden; position: relative;
}

.progress-scanner {
    position: absolute; top: 0; left: 0; height: 100%; width: 40%;
    background: linear-gradient(90deg, transparent, rgba(200,158,255,0.6), #ffffff, rgba(200,158,255,0.6), transparent);
    animation: scan 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

.copyright { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 300; }

@keyframes scan {
    0% { left: -40%; }
    100% { left: 100%; }
}
</style>
</head>
<body>

<div class="splash-card" id="card">
    <div class="artwork-bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="ui-content">
        <div class="brand">
            <div class="logo-text"><span class="logo-t">T</span>com</div>
        </div>

        <div class="spacer"></div>

        <div class="footer">
            <div class="status-row">
                <div class="status-text" id="s">Initializing...</div>
                <div class="version" id="ver"></div>
            </div>
            <div class="progress-track">
                <div class="progress-scanner"></div>
            </div>
            <div class="copyright">&copy; 2026 Thedong. Built with Tauri & Rust.</div>
        </div>
    </div>
</div>

<script>
(function(){
    var card = document.getElementById('card');
    var bg = document.getElementById('bg');
    var img = new Image();
    var isShown = false;

    function revealWindow() {
        if (isShown) return;
        isShown = true;
        bg.style.backgroundImage = 'url("' + img.src + '")';
        try {
            window.__TAURI__.window.getCurrentWindow().show().then(function() {
                requestAnimationFrame(function() {
                    card.classList.add('ready');
                });
            });
        } catch(e) {
            card.classList.add('ready');
        }
    }

    img.onload = revealWindow;
    img.onerror = revealWindow;
    setTimeout(revealWindow, 800);
    img.src = './splash-bg.jpg';

    // 通过 Tauri API 自动获取版本号
    try {
        window.__TAURI__.app.getVersion().then(function(v) {
            document.getElementById('ver').textContent = 'v' + v;
        });
    } catch(e) {
        document.getElementById('ver').textContent = '';
    }

    // 状态文字 — 与 Tcom 实际启动流程对应
    var st = document.getElementById('s');
    var steps = [
        'Initializing Tauri runtime...',
        'Loading serial port drivers...',
        'Preparing workspace...',
        'Registering IPC interfaces...',
        'UI rendering...'
    ];
    var i = 0;
    function next() {
        if(i < steps.length) {
            st.textContent = steps[i];
            i++;
            setTimeout(next, Math.random() * 300 + 150);
        }
    }
    setTimeout(next, 150);
})();
</script>
</body>
</html>
