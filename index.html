<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <!-- 最高优先级预加载本地字体，确保首次渲染时字体已就绪，彻底消除字体切换闪烁（FOUT） -->
  <!-- 注：此路径为 Vite dev server 路径，生产构建 Vite 会优化字体 -->
  <link rel="preload" as="font" type="font/ttf" href="/src/assets/fonts/JetBrainsMono-Medium.ttf"
    crossorigin="anonymous">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tcom</title>
</head>

<body>
  <!-- ⚡ 同步从 localStorage 读取主题颜色，避免 loading 界面颜色闪烁 -->
  <script>
    (function () {
      try {
        var settings = JSON.parse(localStorage.getItem('tcom-settings') || '{}');
        var themeId = settings.theme || 'dark';
        // 根据主题模式设置 loading 骨架颜色
        var isDark = themeId !== 'light';
        var bg = isDark ? '#1e1e1e' : '#ffffff';
        var titlebarBg = isDark ? '#3c3c3c' : '#dddddd';
        var textColor = isDark ? '#cccccc' : '#616161';
        var spinnerBorder = isDark ? '#3c3c3c' : '#e0e0e0';
        // 注入关键颜色变量到 :root
        var root = document.documentElement;
        root.style.setProperty('--loading-bg', bg);
        root.style.setProperty('--loading-titlebar', titlebarBg);
        root.style.setProperty('--loading-text', textColor);
        root.style.setProperty('--loading-spinner-track', spinnerBorder);
        // 更新 meta theme-color（部分平台）
        document.documentElement.style.backgroundColor = bg;
      } catch (e) { }
    })();
  </script>
  <div id="root">
    <style>
      /* 提前设置字体变量默认值，防止 JS 注入前出现字体大小跳变 */
      /* 注：@font-face 声明由 index.css 管理（Vite 会正确处理字体文件路径） */
      :root {
        --st-font-family: 'AppCoreFont', 'Microsoft YaHei', monospace;
        --st-font-size: 15px;
        --st-line-height: 1.5;
        /* loading 骨架颜色默认值（被上方内联脚本覆盖为用户主题颜色） */
        --loading-bg: #1e1e1e;
        --loading-titlebar: #3c3c3c;
        --loading-text: #cccccc;
        --loading-spinner-track: #3c3c3c;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: var(--loading-bg);
      }

      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--loading-bg);
        color: var(--loading-text);
        font-family: monospace;
        flex-direction: column;
        gap: 16px;
        overflow: hidden;
        padding-top: 30px;
        /* Space for titlebar */
      }

      .titlebar-placeholder {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 30px;
        background-color: var(--loading-titlebar);
        -webkit-app-region: drag;
        user-select: none;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid var(--loading-spinner-track);
        border-top-color: #007acc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div class="loading-container">
      <div class="titlebar-placeholder"></div>
      <div class="spinner"></div>
      <div>Loading Tcom...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
