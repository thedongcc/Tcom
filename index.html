<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <!-- 最高优先级预加载本地字体，确保首次渲染时字体已就绪，彻底消除字体切换闪烁（FOUT） -->
  <!-- 注：此路径为 Vite dev server 路径，生产构建 Vite 会优化字体 -->
  <link rel="preload" as="font" type="font/ttf" href="/src/assets/fonts/JetBrainsMono-Medium.ttf"
    crossorigin="anonymous">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tcom</title>
  <link rel="stylesheet" href="/skeleton.css" />
</head>

<body spellcheck="false">
  <!-- ⚡ 同步从 localStorage 读取主题颜色，避免 loading 界面颜色闪烁（内联避免 Release 路径失效） -->
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('tcom-settings')||'{}');var id=s.theme||'dark';var d=id!=='light';var r=document.documentElement;r.style.setProperty('--loading-bg',d?'#1e1e1e':'#ffffff');r.style.setProperty('--loading-titlebar',d?'#3c3c3c':'#dddddd');r.style.setProperty('--loading-text',d?'#cccccc':'#616161');r.style.setProperty('--loading-spinner-track',d?'#3c3c3c':'#e0e0e0');r.style.backgroundColor=d?'#1e1e1e':'#ffffff';}catch(e){}})();</script>
  <div id="root">
    <!-- 骨架屏：拟真 IDE 布局（React 挂载后自动替换） -->
    <div class="sk-container">
      <!-- 标题栏 -->
      <div class="sk-titlebar">
        <span class="sk-title">Tcom</span>
      </div>
      <!-- 主体 -->
      <div class="sk-main">
        <!-- 活动栏 -->
        <div class="sk-activitybar">
          <div class="sk-icon"></div>
          <div class="sk-icon sk-icon-2"></div>
          <div class="sk-icon sk-icon-3"></div>
        </div>
        <!-- 侧边栏 -->
        <div class="sk-sidebar">
          <div class="sk-line-1"></div>
          <div class="sk-line-2"></div>
          <div class="sk-line-3"></div>
          <div class="sk-line-4"></div>
        </div>
        <!-- 主区域 -->
        <div class="sk-content">
          <div class="sk-spinner"></div>
          <div class="sk-text">Loading Tcom Workstation...</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
